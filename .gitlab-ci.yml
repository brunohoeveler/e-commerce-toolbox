# Global variables for all jobs
variables:
  # Git: Do not verify SSL certificate (due to self-signed certificate)
  GIT_SSL_NO_VERIFY: "true"

  # npm Cache in the project directory, so GitLab can cache it
  NPM_CACHE_DIR: "$CI_PROJECT_DIR/.cache/npm"

  # Docker settings for the build job
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

# Docker in Docker Service
services:
  - name: docker:dind
    command: ["--host=tcp://0.0.0.0:2375", "--tls=false"]

stages:
  - build

# -----------------------------------
# Template for Docker jobs
# -----------------------------------
.docker_template: &docker_template
  image: docker:latest
  variables:
    DOCKER_BUILDKIT: 1
    BUILDKIT_INLINE_CACHE: 1
  before_script:
    - docker info
    - echo "Logging in to GitLab Container Registry..."
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker buildx create --name ci-builder --use || docker buildx use ci-builder

# -------------------
# Docker Build
# -------------------
build:
  <<: *docker_template
  stage: build
  script:
    - echo "Building image..."
    - >
      docker buildx build
      --platform linux/amd64
      --provenance=false
      -f docker/Dockerfile
      -t "$CI_REGISTRY_IMAGE/e-commerce-toolbox:$CI_COMMIT_SHA"
      -t "$CI_REGISTRY_IMAGE/e-commerce-toolbox:$CI_COMMIT_REF_SLUG"
      -t "$CI_REGISTRY_IMAGE/e-commerce-toolbox:latest"
      --push
      .
  only:
    - main
