name: e-commerce-toolbox

services:
  web:
    image: registry.portal-ecovis-kso.com/replit/e-commerce-toolbox/e-commerce-toolbox:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Auth Secret
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}

      # Database
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"

      # S3
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}

      # Payment Provider
      AMAZON_SP_APP_ID: ${AMAZON_SP_APP_ID}
      AMAZON_SP_CLIENT_SECRET: ${AMAZON_SP_CLIENT_SECRET}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      STRIPE_CLIENT_ID: ${STRIPE_CLIENT_ID}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    ports:
      - "${PORT:-3000}:5000"

  postgres:
    image: postgres:18
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./volumes/db:/var/lib/postgresql

  migrate:
    profiles: ["migrate"]
    image: oven/bun:1-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
    volumes:
      - ../migrations:/drizzle/migrations:ro
      - ../drizzle.config.ts:/drizzle/drizzle.config.ts:ro
    working_dir: /drizzle
    entrypoint: ["sh", "-c"]
    command:
      - |
        bun install drizzle-kit drizzle-orm pg
        bunx drizzle-kit migrate --config /drizzle/drizzle.config.ts

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400
